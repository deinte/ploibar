name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Prepare Laravel directories
        run: mkdir -p bootstrap/cache storage/framework/{sessions,views,cache}

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build native app
        env:
          NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
        run: php artisan native:build mac --no-interaction

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: nativephp/electron/dist/*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nativephp/electron/dist/*.dmg
          generate_release_notes: true

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: deinte/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dmg
          path: dmg

      - name: Update cask version and SHA
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA=$(shasum -a 256 dmg/*.dmg | head -1 | cut -d' ' -f1)
          DMG_FILENAME=$(ls dmg/*.dmg | head -1 | xargs basename)
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/ploibar.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/ploibar.rb
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Casks/ploibar.rb
          git commit -m "Update PloiBar to v${VERSION}"
          git push
